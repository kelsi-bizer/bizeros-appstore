services:
  calcom:
    image: calcom/cal.com:v6.2.0
    environment:
      TZ: ${TZ:-UTC}
      NODE_ENV: production
      LICENSE: agree
      NEXT_PUBLIC_LICENSE_CONSENT: agree
      NEXT_PUBLIC_WEBAPP_URL: "https://${APP_DOMAIN}"
      NEXTAUTH_URL: "https://${APP_DOMAIN}"
      NEXTAUTH_SECRET: "${CALCOM_NEXTAUTH_SECRET}"
      CALENDSO_ENCRYPTION_KEY: "${CALENDSO_ENCRYPTION_KEY}"
      DATABASE_HOST: calcom-db
      DATABASE_URL: "postgresql://calcom:${CALCOM_DB_PASSWORD}@calcom-db:5432/calcom"
      DATABASE_DIRECT_URL: "postgresql://calcom:${CALCOM_DB_PASSWORD}@calcom-db:5432/calcom"
      EMAIL_FROM: "${EMAIL_FROM}"
      EMAIL_SERVER_HOST: "${EMAIL_SERVER_HOST:-}"
      EMAIL_SERVER_PORT: "${EMAIL_SERVER_PORT:-}"
      EMAIL_SERVER_USER: "${EMAIL_SERVER_USER:-}"
      EMAIL_SERVER_PASSWORD: "${EMAIL_SERVER_PASSWORD:-}"
      GOOGLE_API_CREDENTIALS: "${CALCOM_GOOGLE_API_CREDENTIALS:-}"
      MS_GRAPH_CLIENT_ID: "${MS_GRAPH_CLIENT_ID:-}"
      MS_GRAPH_CLIENT_SECRET: "${MS_GRAPH_CLIENT_SECRET:-}"
      ZOOM_CLIENT_ID: "${ZOOM_CLIENT_ID:-}"
      ZOOM_CLIENT_SECRET: "${ZOOM_CLIENT_SECRET:-}"
      CALCOM_TELEMETRY_DISABLED: "1"
    depends_on:
      calcom-db:
        condition: service_healthy
    x-runtipi:
      is_main: true
      internal_port: 3000

  calcom-db:
    image: postgres:16
    environment:
      POSTGRES_USER: calcom
      POSTGRES_PASSWORD: "${CALCOM_DB_PASSWORD}"
      POSTGRES_DB: calcom
    volumes:
      - ${APP_DATA_DIR}/data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U calcom -d calcom"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

x-runtipi:
  schema_version: 2
