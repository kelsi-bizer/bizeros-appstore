services:
  wordpress:
    image: wordpress:6.9.4-php8.4-apache
    environment:
      TZ: ${TZ:-UTC}
      WORDPRESS_DB_HOST: wordpress-db
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: "${WORDPRESS_DB_PASSWORD}"
      WORDPRESS_CONFIG_EXTRA: "define('WP_HOME','https://${APP_DOMAIN}'); define('WP_SITEURL','https://${APP_DOMAIN}');"
    volumes:
      - ${APP_DATA_DIR}/data/wordpress:/var/www/html
    depends_on:
      wordpress-db:
        condition: service_healthy
    x-runtipi:
      is_main: true
      internal_port: 80

  wordpress-db:
    image: mariadb:11
    environment:
      MARIADB_ROOT_PASSWORD: "${WORDPRESS_DB_ROOT_PASSWORD}"
      MARIADB_DATABASE: wordpress
      MARIADB_USER: wordpress
      MARIADB_PASSWORD: "${WORDPRESS_DB_PASSWORD}"
    volumes:
      - ${APP_DATA_DIR}/data/mariadb:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h localhost -u root -p\"$$MARIADB_ROOT_PASSWORD\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

x-runtipi:
  schema_version: 2
