services:
  invoice-ninja:
    image: invoiceninja/invoiceninja:5.13.19
    user: "1500:1500"
    environment:
      TZ: ${TZ:-UTC}
      APP_ENV: production
      APP_NAME: "Invoice Ninja"
      APP_URL: "https://${APP_DOMAIN}"
      APP_KEY: "base64:${INVOICE_NINJA_APP_KEY_RAW}"
      APP_CIPHER: AES-256-CBC
      REQUIRE_HTTPS: "false"
      TRUSTED_PROXIES: "*"
      QUEUE_CONNECTION: database
      IS_DOCKER: "TRUE"
      DB_HOST: invoice-ninja-db
      DB_PORT: 3306
      DB_DATABASE: ninja
      DB_USERNAME: ninja
      DB_PASSWORD: ninja
      IN_USER_EMAIL: "${INVOICE_NINJA_USER_MAIL}"
      IN_PASSWORD: "${INVOICE_NINJA_USER_PASSWORD}"
    volumes:
      - ${APP_DATA_DIR}/data/public:/var/www/app/public:rw,delegated
      - ${APP_DATA_DIR}/data/storage:/var/www/app/storage:rw,delegated
      - ${APP_DATA_DIR}/data/php/php.ini:/usr/local/etc/php/php.ini:ro
      - ${APP_DATA_DIR}/data/php/php-cli.ini:/usr/local/etc/php/php-cli.ini:ro
    depends_on:
      invoice-ninja-db:
        condition: service_healthy
      invoice-ninja-init:
        condition: service_completed_successfully

  invoice-ninja-web:
    image: nginx:1.27-alpine
    volumes:
      - ${APP_DATA_DIR}/data/nginx/invoice-ninja.conf:/etc/nginx/conf.d/default.conf:ro
      - ${APP_DATA_DIR}/data/public:/var/www/app/public:ro
    depends_on:
      invoice-ninja:
        condition: service_started
    x-runtipi:
      is_main: true
      internal_port: 80

  invoice-ninja-db:
    image: mariadb:11
    environment:
      MARIADB_ROOT_PASSWORD: "${INVOICE_NINJA_DB_PASSWORD}"
      MARIADB_USER: ninja
      MARIADB_PASSWORD: ninja
      MARIADB_DATABASE: ninja
    volumes:
      - ${APP_DATA_DIR}/data/mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h localhost -u root -p\"$$MARIADB_ROOT_PASSWORD\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  invoice-ninja-init:
    image: bash:5
    command: bash -c "chmod +x /tmp/data/init/init.sh && /tmp/data/init/init.sh"
    volumes:
      - ${APP_DATA_DIR}/data:/tmp/data

x-runtipi:
  schema_version: 2
