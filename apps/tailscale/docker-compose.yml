services:
  tailscale:
    image: tailscale/tailscale:v1.96.5
    environment:
      TS_AUTHKEY: "${TAILSCALE_AUTHKEY}"
      TS_HOSTNAME: "${TAILSCALE_HOSTNAME:-bizeros}"
      TS_AUTH_ONCE: "${TAILSCALE_AUTH_ONCE:-true}"
      TS_USERSPACE: "${TAILSCALE_USERSPACE:-true}"
      TS_ACCEPT_DNS: "${TAILSCALE_ACCEPT_DNS:-false}"
      TS_ROUTES: "${TAILSCALE_ROUTES:-}"
      TS_SERVE_CONFIG: "${TAILSCALE_SERVE_CONFIG:-}"
      TS_EXTRA_ARGS: "${TAILSCALE_EXTRA_ARGS:-}"
      TS_STATE_DIR: /var/lib/tailscale
    cap_add:
      - net_admin
      - sys_module
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - ${APP_DATA_DIR}/data/state:/var/lib/tailscale
      - ${APP_DATA_DIR}/data/config:/config
    x-runtipi:
      is_main: true
      internal_port: 8093

x-runtipi:
  schema_version: 2
