services:
  miles:
    image: ghcr.io/kelsi-bizer/miles-agent:latest
    environment:
      TZ: ${TZ:-UTC}
      # Arcee Trinity (default LLM)
      ARCEE_API_KEY: ${ARCEE_API_KEY}
      ARCEE_BASE_URL: https://api.arcee.ai/v1
      ARCEE_MODEL: arcee-trinity
      # OpenAI-compatible API server (the entry point Runtipi exposes)
      API_SERVER_HOST: 0.0.0.0
      API_SERVER_PORT: "8642"
      API_SERVER_KEY: ${API_SERVER_KEY}
      # Runtime paths — MILES_HOME is canonical, HERMES_HOME is the legacy alias
      MILES_HOME: /opt/data
      HERMES_HOME: /opt/data
      MILES_UID: "1000"
      MILES_GID: "1000"
    volumes:
      - ${APP_DATA_DIR}/data:/opt/data
    command: ["gateway", "run"]
    healthcheck:
      test:
        - CMD-SHELL
        - "python3 -c 'import socket,sys; s=socket.socket(); s.settimeout(2); s.connect((\"localhost\",8642))' || exit 1"
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    x-runtipi:
      is_main: true
      internal_port: 8642

x-runtipi:
  schema_version: 2
