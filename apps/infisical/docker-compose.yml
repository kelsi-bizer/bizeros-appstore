services:
  infisical:
    image: infisical/infisical:v0.159.22
    environment:
      TZ: ${TZ:-UTC}
      NODE_ENV: production
      ENCRYPTION_KEY: "${INFISICAL_ENCRYPTION_KEY}"
      AUTH_SECRET: "${INFISICAL_AUTH_SECRET}"
      SITE_URL: "https://${APP_DOMAIN}"
      POSTGRES_USER: infisical
      POSTGRES_PASSWORD: "${INFISICAL_DB_PASSWORD}"
      POSTGRES_DB: infisical
      DB_CONNECTION_URI: "postgres://infisical:${INFISICAL_DB_PASSWORD}@infisical-db:5432/infisical"
      REDIS_URL: redis://infisical-redis:6379
      SMTP_HOST: "${SMTP_HOST:-}"
      SMTP_PORT: "${SMTP_PORT:-}"
      SMTP_USERNAME: "${SMTP_USERNAME:-}"
      SMTP_PASSWORD: "${SMTP_PASSWORD:-}"
      SMTP_FROM_ADDRESS: "${SMTP_FROM_ADDRESS:-}"
      SMTP_FROM_NAME: "${SMTP_FROM_NAME:-Infisical}"
    depends_on:
      infisical-db:
        condition: service_healthy
      infisical-redis:
        condition: service_healthy
    x-runtipi:
      is_main: true
      internal_port: 8080

  infisical-db:
    image: postgres:14-alpine
    environment:
      POSTGRES_USER: infisical
      POSTGRES_PASSWORD: "${INFISICAL_DB_PASSWORD}"
      POSTGRES_DB: infisical
    volumes:
      - ${APP_DATA_DIR}/data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U infisical -d infisical"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  infisical-redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    volumes:
      - ${APP_DATA_DIR}/data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

x-runtipi:
  schema_version: 2
