services:
  # One-shot init: prepares bind-mount data dirs to be writable by the
  # mattermost user (UID 2000). Required because the upstream Mattermost
  # image is distroless (no shell at entrypoint) so it can't chown its
  # own paths on first boot.
  bizeros-chat-init:
    image: bash:5
    command:
      - bash
      - -c
      - "mkdir -p /target/config /target/data /target/logs /target/plugins /target/client-plugins /target/bleve-indexes && chown -R 2000:2000 /target"
    volumes:
      - ${APP_DATA_DIR}/data/mattermost:/target

  bizeros-chat-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: bizeros
      POSTGRES_PASSWORD: "${BIZEROS_DB_PASSWORD}"
      POSTGRES_DB: bizeros_chat
    volumes:
      - ${APP_DATA_DIR}/data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bizeros -d bizeros_chat"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  bizeros-chat:
    image: ghcr.io/kelsi-bizer/bizeros-chat:11.7.0
    environment:
      TZ: ${TZ:-UTC}
      MM_SQLSETTINGS_DRIVERNAME: postgres
      MM_SQLSETTINGS_DATASOURCE: "postgres://bizeros:${BIZEROS_DB_PASSWORD}@bizeros-chat-db:5432/bizeros_chat?sslmode=disable&connect_timeout=10"
      MM_BLEVESETTINGS_INDEXDIR: /mattermost/bleve-indexes
      MM_SERVICESETTINGS_SITEURL: "https://${APP_DOMAIN}"
      # Override the binary's compiled-in "Mattermost" defaults so the
      # rebrand is consistent on first boot before any admin config edits.
      MM_TEAMSETTINGS_SITENAME: BizerOS Chat
      MM_EMAILSETTINGS_FEEDBACKNAME: BizerOS Chat
    volumes:
      - ${APP_DATA_DIR}/data/mattermost/config:/mattermost/config
      - ${APP_DATA_DIR}/data/mattermost/data:/mattermost/data
      - ${APP_DATA_DIR}/data/mattermost/logs:/mattermost/logs
      - ${APP_DATA_DIR}/data/mattermost/plugins:/mattermost/plugins
      - ${APP_DATA_DIR}/data/mattermost/client-plugins:/mattermost/client/plugins
      - ${APP_DATA_DIR}/data/mattermost/bleve-indexes:/mattermost/bleve-indexes
    depends_on:
      bizeros-chat-db:
        condition: service_healthy
      bizeros-chat-init:
        condition: service_completed_successfully
    x-runtipi:
      is_main: true
      internal_port: 8065

x-runtipi:
  schema_version: 2
