services:
  mattermost:
    image: mattermost/mattermost-team-edition:latest
    environment:
      TZ: ${TZ:-UTC}
      MM_SQLSETTINGS_DRIVERNAME: postgres
      MM_SQLSETTINGS_DATASOURCE: postgres://mmuser:mmuser_password@mattermost-db:5432/mattermost?sslmode=disable&connect_timeout=10
      MM_SERVICESETTINGS_SITEURL: https://${APP_DOMAIN}
      MM_SERVICESETTINGS_ALLOWCORSFROM: "*"
      MM_TEAMSETTINGS_SITENAME: ${SITE_NAME}
      MM_SUPPORTSETTINGS_SUPPORTEMAIL: ${ADMIN_EMAIL}
    volumes:
      - ${APP_DATA_DIR}/data/config:/mattermost/config
      - ${APP_DATA_DIR}/data/data:/mattermost/data
    depends_on:
      mattermost-db:
        condition: service_healthy
    x-runtipi:
      is_main: true
      internal_port: 8065

  mattermost-db:
    image: postgres:15
    environment:
      POSTGRES_USER: mmuser
      POSTGRES_PASSWORD: mmuser_password
      POSTGRES_DB: mattermost
    volumes:
      - ${APP_DATA_DIR}/data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mmuser -d mattermost"]
      interval: 10s
      timeout: 5s
      retries: 5

x-runtipi:
  schema_version: 2
